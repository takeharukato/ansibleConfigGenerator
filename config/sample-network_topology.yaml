#
# ノード定義
#
# 書式: 各ノードのノード名をキーとして, ノード定義の辞書を値とする形式の辞書を定義する
#  ノード名:
#   - ノード定義の辞書
#
# ノード定義の辞書のフィールド:
#
#   name (必須): ノードを一意に識別するキー名 (string)
#     他のフィールド (gateway_node, control_plane 等) から参照される識別子として使用される
#
#   hostname_fqdn (必須): ノードの完全修飾ドメイン名 (Fully Qualified Domain Name, FQDN) (string)
#
#   roles (オプション): ノードに割り当てるロール名のリスト (list of string)
#     globals.roles で定義されたロール名を指定する
#     複数ロールを同時に指定可能
#     指定したロールに紐付くサービスがそのノードへ自動的に供給される
#     使用可能なロール名:
#       - k8s_control_plane       : Kubernetes コントロールプレーンノード
#       - k8s_worker              : Kubernetes ワーカーノード
#       - infra_server            : インフラサービス群を導入するサーバー
#       - rancher                 : Rancher を導入するノード
#       - docker                  : Docker CE を導入するノード
#       - dev_linux               : 開発用 Linux ノード
#       - route_reflector         : BGP ルートリフレクタ (FRR ルータ) ノード
#       - internal_router         : 内部ネットワーク用ルータノード
#       - terraform_orchestration : Terraform 構築対象ノードを示すマーカー
#
#   datacenter (オプション): ノードが所属するデータセンタのキー名 (string)
#     globals.datacenters で定義されたキー名を指定する
#     route_reflector ロールを持つノードには設定が必要
#
#   cluster (オプション): ノードが所属する Kubernetes クラスタのキー名 (string)
#     k8s_control_plane / k8s_worker ロールを持つノードにのみ使用
#     globals.networks の cluster フィールドに対応するキー名を指定する
#
#   control_plane (オプション): ワーカーノードが所属するコントロールプレーンノードの name (string)
#     k8s_worker ロールを持つノードにのみ指定する
#
#   interfaces (オプション): ネットワークインターフェースの定義のリスト
#     書式: 以下のフィールドを持つ辞書のリスト
#
#     interfaces のフィールド:
#       netif (必須): ネットワークインターフェース名 (string, 例: "enX0")
#       network (必須): globals.networks で定義されたネットワークキー名 (string)
#       mac (オプション): ネットワークインターフェースの MAC アドレス (string)
#         指定することで Terraform / Ansible が特定 NIC に設定を適用する際に使用される
#       static_ipv4_addr (オプション): 静的 IPv4 アドレス (string, 例: "192.168.20.10")
#       static_ipv6_addr (オプション): 静的 IPv6 アドレス (string, 例: "fd00::10")
#
#   scalars (オプション): ノード固有のスカラー値の辞書
#     globals.scalars の値をノードレベルで上書きできる
#     ノード種別ごとに使用するスカラー値が異なる
#
#     FRR ルータノード向けスカラー値:
#       frr_bgp_asn        : BGP Autonomous System Number (ASN) (int)
#       frr_bgp_router_id  : BGP ルーター ID (IPv4 アドレス形式の string)
#
#     Kubernetes コントロールプレーンノード向けスカラー値:
#       k8s_ctrlplane_host_fqdn          : コントロールプレーンノードの FQDN (string)
#       k8s_ctrlplane_endpoint           : API サーバーエンドポイントアドレス (string)
#       k8s_pod_ipv4_network_cidr        : Pod ネットワーク CIDR (IPv4, string)
#       k8s_pod_ipv6_network_cidr        : Pod ネットワーク CIDR (IPv6, string)
#       k8s_pod_ipv4_service_subnet      : Service ネットワーク CIDR (IPv4, string)
#       k8s_pod_ipv6_service_subnet      : Service ネットワーク CIDR (IPv6, string)
#       k8s_cilium_cm_cluster_name       : Cilium Cluster Mesh 用クラスタ名 (string)
#       k8s_cilium_cm_cluster_id         : Cilium Cluster Mesh 用クラスタ識別子 (int)
#       k8s_virtualcluster_enabled       : VirtualCluster 機能を有効にするかどうか (bool)
#       k8s_vcinstances_enabled          : VirtualCluster インスタンス機能を有効にするかどうか (bool)
#       vcinstances_etcd_storage_enabled : VirtualCluster の etcd ストレージを有効にするかどうか (bool)
#       vcinstances_etcd_storage_size    : VirtualCluster の etcd ストレージサイズ (string, 例: "10Gi")
#       vcinstances_etcd_storage_class   : VirtualCluster の etcd ストレージクラス名 (string)
#
#   services (オプション): ノード固有のサービス設定の辞書
#     globals.services の既定値をノードレベルで上書きできる
#     globals.services と同じキー名を使用する
#     ノード固有のサービスとして vm_params を追加可能
#
#     vm_params: Terraform での VM 構築パラメタ (terraform_orchestration ロールを持つノード向け)
#       config.template_type    : VM テンプレートタイプ (string, "ubuntu" または "rhel")
#       config.firmware         : VM ファームウェアタイプ (string, "uefi" または "bios")
#       config.resource_profile : リソースプロファイル名 (string)
#         globals.services.xcp_ng_environment.config.vm_group_defaults で定義されたプロファイル名を指定
#       config.vm_group         : VM グループ名 (string, オプション)
#         globals.services.xcp_ng_environment.config.vm_group_map のフォールバックより優先される
#
#   k8s_bgp (オプション): BGP Control Plane 設定 (k8s_control_plane ロールを持つノードのみ)
#     enabled              : BGP Control Plane 設定を有効にするかどうか (bool)
#     node_name            : BGP 設定を適用するノードの name (string)
#     local_asn            : ローカル BGP ASN (int)
#     kubeconfig           : kubeconfig ファイルのパス (string)
#     export_pod_cidr      : Pod CIDR を BGP で広告するかどうか (bool)
#     advertise_services   : Service を BGP で広告するかどうか (bool)
#     address_families     : 使用するアドレスファミリーのリスト (list, 例: [ipv4, ipv6])
#     neighbors            : BGP ピアの定義のリスト
#       - peer_address          : BGP ピアの IP アドレス (CIDR 形式, string)
#         peer_asn              : BGP ピアの ASN (int)
#         peer_port             : BGP ピアのポート番号 (int)
#         hold_time_seconds     : BGP Hold Time (秒, int)
#         connect_retry_seconds : BGP Connect Retry Time (秒, int)
#
#   vcinstances_clusterversions (オプション): VirtualCluster バージョン定義のリスト
#     (k8s_control_plane ロールを持つノードかつ k8s_vcinstances_enabled: true の場合に使用)
#     - name: ClusterVersion リソースの名称 (string)
#
#   vcinstances_virtualclusters (オプション): VirtualCluster インスタンス定義のリスト
#     (k8s_control_plane ロールを持つノードかつ k8s_vcinstances_enabled: true の場合に使用)
#     - name                  : VirtualCluster の名称 (string)
#       namespace             : VirtualCluster を作成する Kubernetes Namespace (string)
#       clusterVersionName    : 使用する ClusterVersion リソースの名称 (string)
#       clusterDomain         : VirtualCluster のクラスタドメイン (string)
#       kubeConfigSecretName  : VirtualCluster の kubeconfig を格納する Secret 名 (string)
#
