#
# ネットワークトポロジ定義ファイル
#
---
version: 2
#
# ノード間共通定義
#
globals:
  # 管理ネットワークは, 外部管理ネットワークと内部管理ネットワークの2種類を定義。
  #
  # 外部管理ネットワークは, 物理ホスト/仮想化基盤環境から外部に抜けるためのゲートウェイに
  # 直接接続可能なホスト群が接続されることを想定している。
  #
  # 内部管理ネットワークは, 物理ホスト/仮想化基盤環境から外部に抜けるためのゲートウェイに
  # 直接接続されないホスト群が接続されることを想定している。
  # 内部管理ネットワークから外部管理ネットワークへの通信は, ルーター(ゲートウェイ)を通して
  # 行われることを想定している。
  # 内部管理ネットワークには, その内部管理ネットワークから外部管理ネットワークに抜けるための
  # ゲートウェイが1つ以上接続されており, 当該のゲートウェイは外部管理ネットワークと
  # 内部管理ネットワークの双方に接続されていることを想定している。
  #
  #
  # 管理ネットワーク用NIC
  # 形式: [外部管理NIC, 内部管理NIC1, 内部管理NIC2, ...]
  # 管理ネットワーク用のNICを予約するために使用する。
  # 本ツールの出力であるhost_varsを使用するansible playbook
  # https://github.com/takeharukato/ansible-linux-setup
  # の
  # group_vars/all/all.yml
  # で以下のIFが管理ネットワーク用のNICとして使用可能であることを想定している
  # ことから, 以下のような形式で管理ネットワーク用NICを予約する。
  reserved_nic_pairs:
    - [enX0, enX1]
    - [ens160, ens194]
    - [eth0, eth1]

  # generate_internal_network_list: dns-server 向け internal_network_list を生成するかどうか
  generate_internal_network_list: false

  #
  # ネットワーク設定
  #
  # 書式: 以下の形式の辞書のリストを定義する
  #  ネットワークキー名: ネットワーク定義の辞書
  #
  # ネットワーク定義の辞書のフィールド:
  #
  #   role (必須): ネットワークの役割を定義する文字列
  #     - external_control_plane_network  外部管理ネットワーク
  #     - private_control_plane_network   内部管理ネットワーク
  #     - data_plane_network              データプレーン用ネットワーク
  #     - bgp_transport_network           Border Gateway Protocol (BGP) ルーティング情報交換用ネットワーク
  #
  #   ipv4_cidr (オプション): ネットワークの IPv4 アドレス範囲 (CIDR 記号法, 例: "192.168.0.0/24")
  #
  #   ipv6_cidr (オプション): ネットワークの IPv6 アドレス範囲 (CIDR 記号法, 例: "fd00::/64")
  #
  #   gateway4 (オプション): IPv4 ゲートウェイアドレス
  #     external_control_plane_network の場合, 外部ネットワークに抜けるためのゲートウェイを設定
  #     private_control_plane_network の場合, 使用されない (gateway_node で指定)
  #     その他のネットワークには設定しない
  #
  #   gateway6 (オプション): IPv6 ゲートウェイアドレス
  #     gateway4 と同様のルールに従い設定
  #
  #   gateway_node (オプション): private_control_plane_network 用のゲートウェイノード名
  #     内部管理ネットワークから外部管理ネットワークに抜けるためのルータノード名を指定
  #     このノードのこのネットワークインターフェース上のアドレスがゲートウェイとして使用される
  #
  #   dns_search (オプション): DNS 検索ドメイン (カンマ区切り, 例: "example.com")
  #
  #   name_servers_ipv4 (オプション): IPv4 DNS サーバーアドレスのリスト
  #
  #   name_servers_ipv6 (オプション): IPv6 DNS サーバーアドレスのリスト
  #
  #   ignore_auto_ipv4_dns (オプション): IPv4 の自動 DNS 設定 (DHCP から取得したサーバー) を無視するかどうか (bool)
  #     false の場合, DHCP から取得した IPv4 DNS サーバーも使用される
  #     true の場合, name_servers_ipv4 で明示的に指定したサーバーのみ使用される
  #
  #   ignore_auto_ipv6_dns (オプション): IPv6 の自動 DNS 設定 (RA/DHCPv6 から取得したサーバー) を無視するかどうか (bool)
  #     false の場合, RA/DHCPv6 から取得した IPv6 DNS サーバーも使用される
  #     true の場合, name_servers_ipv6 で明示的に指定したサーバーのみ使用される
  #
  #   route_metric_ipv4 (オプション): IPv4 ルートメトリック (整数, 値が小さいほど優先度が高い)
  #     このネットワークに対するルートの優先度を指定
  #     複数のネットワークが重複する場合, メトリックで優先度を制御
  #
  #   route_metric_ipv6 (オプション): IPv6 ルートメトリック (整数, 値が小さいほど優先度が高い)
  #     IPv4 ルートメトリックと同様の役割
  #
  #   datacenter (オプション): このネットワークが所属するデータセンタのキー名
  #     data_plane_network でのみ使用
  #     globals.datacenters で定義されたキー名を指定
  #
  #   cluster (オプション): このネットワークが所属するクラスタのキー名
  #     data_plane_network でのみ使用
  #     複数のクラスタを同じデータセンタ内で定義する場合に指定
  #
  networks:
    mgmt_external:
      role: external_control_plane_network
      ipv4_cidr: "192.168.20.0/24"
      ipv6_cidr: "fd69:6684:61a:1::/64"
      gateway4: "192.168.20.1"
      gateway6: "fd69:6684:61a:1::1"
      dns_search: "example.org"
      name_servers_ipv4:
        - "192.168.20.11"
        - "192.168.20.1"
      name_servers_ipv6:
        - "fd69:6684:61a:1::11"
        - "2606:4700:4700::1111"
      ignore_auto_ipv4_dns: true
      ignore_auto_ipv6_dns: true
    mgmt_internal:
      role: private_control_plane_network
      ipv4_cidr: "192.168.30.0/24"
      ipv6_cidr: "fdad:ba50:248b:1::/64"
      gateway4: "192.168.30.10"
      gateway6: "fdad:ba50:248b:1::10"
      gateway_node: "router"
      dns_search: "example.org"
      name_servers_ipv4:
        - "192.168.20.11"
        - "192.168.20.1"
      name_servers_ipv6:
        - "fd69:6684:61a:1::11"
        - "2606:4700:4700::1111"
      ignore_auto_ipv4_dns: true
      ignore_auto_ipv6_dns: true
    k8s_net1:
      role: data_plane_network
      datacenter: dc1
      cluster: cluster1
      ipv4_cidr: "192.168.40.0/24"
      ipv6_cidr: "fd69:6684:61a:2::/64"
      dns_search: "example.org"
      name_servers_ipv4:
        - "192.168.20.11"
        - "192.168.20.1"
      name_servers_ipv6:
        - "fd69:6684:61a:1::11"
        - "2606:4700:4700::1111"
      ignore_auto_ipv4_dns: true
      ignore_auto_ipv6_dns: true
      route_metric_ipv4: 300
      route_metric_ipv6: 300
    k8s_net2:
      role: data_plane_network
      datacenter: dc2
      cluster: cluster2
      ipv4_cidr: "192.168.50.0/24"
      ipv6_cidr: "fd69:6684:61a:3::/64"
      dns_search: "example.org"
      name_servers_ipv4:
        - "192.168.20.11"
        - "192.168.20.1"
      name_servers_ipv6:
        - "fd69:6684:61a:1::11"
        - "2606:4700:4700::1111"
      ignore_auto_ipv4_dns: true
      ignore_auto_ipv6_dns: true
      route_metric_ipv4: 300
      route_metric_ipv6: 300
    frr_exchange:
      role: bgp_transport_network
      ipv4_cidr: "192.168.255.0/24"
      ipv6_cidr: "fd69:6684:61a:90::/64"
      dns_search: "example.org"
      name_servers_ipv4:
        - "192.168.20.11"
        - "192.168.20.1"
      name_servers_ipv6:
        - "fd69:6684:61a:1::11"
        - "2606:4700:4700::1111"
      ignore_auto_ipv4_dns: true
      ignore_auto_ipv6_dns: true
      route_metric_ipv4: 300
      route_metric_ipv6: 300
  #
  # データセンタ定義
  #
  # 書式: 以下の形式の辞書のリストを定義する
  #  データセンタキー名: データセンタ定義の辞書
  #
  # データセンタ定義の辞書のフィールド:
  #
  #   name: データセンタの名称
  #   asn: データセンタのBorder Gateway Protocol (BGP) Autonomous System Number (ASN)
  #   route_reflector: 他のデータセンタ間でeBGPで経路交換するルータリフレクタが動作するノード
  #
  datacenters:
    external_gw:
      name: "External Gateway"
      asn: 65100
      route_reflector: extgw
    dc1:
      name: "DataCenter 1"
      asn: 65011
      route_reflector: frr01
    dc2:
      name: "DataCenter 2"
      asn: 65012
      route_reflector: frr02
  #
  # ロール定義 (ロール名 => サービスリストの辞書)
  #
  # 書式: 以下の形式の辞書を定義する
  #  ロール名: サービスリスト
  #
  # ノードに roles: でロール名を割り当てると, ロールに紐付くサービスが
  # そのノードへ自動的に供給される。
  # roles: の値はリスト形式で記載し, 複数ロールを同時に割り当て可能。
  # サービスの導入要否はすべてこのロール定義から決定する。
  #
  # ロール定義の辞書のフィールド:
  #
  #   k8s_control_plane: Kubernetes (K8s) コントロールプレーンノード向けロール
  #     コントロールプレーンノードに導入するサービスのリストを定義する
  #     このロールを持つノードには Kubernetes コントロールプレーン関連サービスが供給される
  #
  #   k8s_worker: Kubernetes ワーカーノード向けロール
  #     ワーカーノードに導入するサービスのリストを定義する
  #     このロールを持つノードには Kubernetes ワーカー関連サービスが供給される
  #
  #   infra_server: インフラサービス群を導入するサーバー向けロール
  #     DNS サーバー, NTP サーバー, NFS サーバー, LDAPサーバー, Redmine, GitLab などの
  #     インフラサービスを導入するサービスのリストを定義する
  #
  #   rancher: Rancher (Kubernetes 管理基盤) を導入するノード向けロール
  #     Rancher を導入するサービスのリストを定義する
  #
  #   docker: Docker CE (コンテナエンジン) を導入するノード向けロール
  #     Docker CE を導入するサービスのリストを定義する
  #
  #   dev_linux: 開発用 Linux ノード向けロール
  #     ホームバックアップ, Terraform などの開発用ツールを導入する
  #     サービスのリストを定義する
  #
  #   route_reflector: BGP ルートリフレクタ (Free Range Routing (FRR) ルータ) ノード向けロール
  #     FRR ルートリフレクタを導入するサービスのリストを定義する
  #     データセンタ間の Border Gateway Protocol (BGP) 経路交換を担う
  #
  #   internal_router: 内部ネットワーク用ルータノード向けロール
  #     内部管理ネットワーク向けルータ, Dynamic Host Configuration Protocol (DHCP) サーバー,
  #     Router Advertisement Daemon (radvd) などを導入するサービスのリストを定義する
  #     内部管理ネットワークから外部管理ネットワークへの通信を中継する
  #
  #   terraform_orchestration: Terraform 対象ノードを示すマーカーロール
  #     Terraform の tfvars 生成時に, ノードの設定パラメタをterraform.tfvars に
  #     出力する対象となるノードを決定する際に使用される。
  #     generate_terraform_tfvars.pyは, 本ロールを持つノードについて,
  #     ノード構築パラメタを terraform.tfvars に出力する。
  #
  roles:
    k8s_control_plane:
      - cilium
      - multus
      - whereabouts
      - hubble_cli
      - hubble_ui
      - helm
      - k8s_control_plane_base
      - k8s_node_common
      - mdns
      - ntp_client
      - nm_ddns
      - proxy_client
      - sudo
      - user_skel
    k8s_worker:
      - k8s_worker_base
      - k8s_node_common
      - hubble_cli
      - netgauge
      - mdns
      - ntp_client
      - nm_ddns
      - proxy_client
      - sudo
      - user_skel
    infra_server:
      - ntp-server
      - dns-server
      - nfs-server
      - ldap
      - redmine
      - gitlab
      - mdns
      - ntp_client
      - nm_ddns
      - proxy_client
      - sudo
      - user_skel
    rancher:
      - rancher
      - mdns
      - ntp_client
      - nm_ddns
      - proxy_client
      - sudo
      - user_skel
    docker:
      - docker-ce
      - mdns
      - ntp_client
      - nm_ddns
      - proxy_client
      - sudo
      - user_skel
    dev_linux:
      - backup_home
      - mdns
      - ntp_client
      - nm_ddns
      - proxy_client
      - sudo
      - user_skel
    route_reflector:
      - frr_route_reflector
      - mdns
      - ntp_client
      - nm_ddns
      - proxy_client
      - sudo
      - user_skel
    internal_router:
      - internal_router
      - kea-dhcp
      - radvd
      - mdns
      - ntp_client
      - nm_ddns
      - proxy_client
      - sudo
      - user_skel
    terraform_orchestration: []
  #
  # 全ノード共通サービス既定値
  #
  # ノードに供給されるサービスの既定値 (デフォルト設定) を定義する。
  # ノード固有の設定は nodes: 配下の services: で上書きできる。
  # ロール定義 (globals.roles) によってノードへ供給するサービスが決定され,
  # 各サービスの config: フィールドの値がそのノードに適用される。
  #
  # 書式: 以下の形式の辞書を定義する
  #  サービス名: サービス設定の辞書
  #
  # サービス設定の辞書のフィールド:
  #
  #   config (オプション): サービス固有の設定値の辞書
  #     サービスごとに異なるキーと値を持つ。
  #     省略した場合 (config:) は null が設定され, Ansible ロール側の既定値が使用される。
  #     空辞書 ({}) の場合もサービスは有効だが, 設定値は Ansible ロール側の既定値が使用される。
  #
  # 各サービスの説明:
  #
  #   gitlab: GitLab (ソースコード管理・CI/CD 基盤) サービス設定
  #     config.hostname: GitLab サーバーのホスト名 (string)
  #     config.gitlab_enable_backup_script: バックアップスクリプトを有効にするかどうか (bool)
  #     config.gitlab_backup_rotation: バックアップの世代数 (int)
  #     config.gitlab_backup_nfs_server: バックアップ先 NFS サーバーのホスト名 (string)
  #     config.gitlab_backup_nfs_dir: NFS サーバー上のエクスポートディレクトリ (string)
  #     config.gitlab_backup_mount_point: NFS マウントポイント (string)
  #     config.gitlab_backup_dir_on_nfs: NFS 上のバックアップ保存ディレクトリ (string)
  #
  #   ntp-server: NTP (Network Time Protocol) サーバー設定
  #     config.external_ntp_servers_list: 参照する外部 NTP サーバーアドレスのリスト (list)
  #     config.ntp_allow: NTP クライアントとして許可するネットワーク範囲 (CIDR 記法, string)
  #
  #   dns-server: DNS (Domain Name System) サーバー設定
  #     config.dns_network_ipv6_prefix_filename: IPv6 逆引きゾーンファイル名に使用するプレフィックス文字列 (string)
  #     config.dns_server: DNS サーバーの完全修飾ドメイン名 (FQDN, string)
  #     config.dns_server_ipv4_address: DNS サーバーの IPv4 アドレス (string)
  #     config.dns_server_ipv6_address: DNS サーバーの IPv6 アドレス (string)
  #     config.dns_domain: 管理する DNS ドメイン名 (string)
  #     config.dns_network: ネットワークアドレス (string)
  #     config.dns_network_ipv4_prefix: IPv4 ネットワークプレフィックス (string, 例: "192.168.20")
  #     config.dns_network_ipv4_prefix_len: IPv4 プレフィックス長 (string, 例: "24")
  #     config.dns_network_ipv6_prefix: IPv6 ネットワークプレフィックス (string)
  #     config.dns_network_ipv6_prefix_len: IPv6 プレフィックス長 (string, 例: "64")
  #     config.dns_ipv4_reverse: IPv4 逆引きゾーン名 (string, 例: "20.168.192")
  #     config.dns_ipv6_reverse: IPv6 逆引きゾーン名 (string)
  #     config.dns_ddns_key_secret: Dynamic DNS (DDNS) 更新用の TSIG 鍵 (string)
  #
  #   nfs-server: NFS (Network File System) サーバー設定
  #     config.nfs_export_directory: NFS でエクスポートするディレクトリのパス (string)
  #     config.nfs_network: NFS クライアントとして許可するネットワーク範囲 (CIDR 記法, string)
  #     config.nfs_options: NFS エクスポートオプション文字列 (string)
  #
  #   ldap: LDAP (Lightweight Directory Access Protocol) サーバー設定
  #     config.ldap_organization: LDAP 組織名 (string)
  #     config.ldap_domain: LDAP ドメイン名 (string)
  #     config.ldap_admin_password: LDAP 管理者パスワード (string)
  #     config.ldap_admin_port: LDAP 管理用ポート番号 (int)
  #
  #   rancher: Rancher (Kubernetes 管理基盤) サービス設定
  #     config.rancher_host: Rancher サーバーのホスト名 (string)
  #     config.rancher_cert_domain_name: TLS 証明書のドメイン名 (string)
  #     config.rancher_cert_subject_country: TLS 証明書のサブジェクト国コード (string, 例: "JP")
  #     config.rancher_cert_subject_state: TLS 証明書のサブジェクト都道府県名 (string)
  #     config.rancher_cert_subject_locality: TLS 証明書のサブジェクト市区町村名 (string)
  #     config.rancher_cert_subject_org: TLS 証明書のサブジェクト組織名 (string)
  #
  #   docker-ce: Docker CE (コンテナエンジン) サービス設定
  #     config.docker_ce_users: Docker グループに追加するユーザー名のリスト (list)
  #     config.docker_ce_enable_backup_script: バックアップスクリプトを有効にするかどうか (bool)
  #     config.docker_ce_backup_rotation: バックアップの世代数 (int)
  #     config.docker_ce_backup_nfs_server: バックアップ先 NFS サーバーのホスト名 (string)
  #     config.docker_ce_backup_nfs_dir: NFS サーバー上のエクスポートディレクトリ (string)
  #     config.docker_ce_backup_mount_point: NFS マウントポイント (string)
  #     config.docker_ce_backup_dir_on_nfs: NFS 上のバックアップ保存ディレクトリ (string)
  #
  #   redmine: Redmine (プロジェクト管理・課題追跡ツール) サービス設定
  #     config.redmine_enable_backup_script: バックアップスクリプトを有効にするかどうか (bool)
  #     config.redmine_backup_rotation: バックアップの世代数 (int)
  #     config.redmine_backup_nfs_server: バックアップ先 NFS サーバーのホスト名 (string)
  #     config.redmine_backup_nfs_dir: NFS サーバー上のエクスポートディレクトリ (string)
  #     config.redmine_backup_mount_point: NFS マウントポイント (string)
  #     config.redmine_backup_dir_on_nfs: NFS 上のバックアップ保存ディレクトリ (string)
  #
  #   netgauge: Netgauge (ネットワーク帯域計測ツール) サービス設定
  #     config.netgauge_version: Netgauge のバージョン (string)
  #     config.netgauge_dir: Netgauge インストール先ディレクトリ (string)
  #     config.netgauge_configure: configure スクリプトへ渡すオプション文字列 (string)
  #
  #   backup_home: ホームディレクトリバックアップサービス設定
  #     config.user_settings_backup_home_script_enabled: バックアップスクリプトを有効にするかどうか (bool)
  #     config.user_settings_backup_home_rotation: バックアップの世代数 (int)
